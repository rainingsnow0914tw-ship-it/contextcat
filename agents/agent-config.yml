# ═══════════════════════════════════════════════════════════════
# ContextCat Agent Configuration
# Network policy to allow external API access for:
# - Google Imagen 4 (reference image generation)
# - Google Veo 3.1 (video + audio generation)
# - Google Vertex AI (model endpoints)
# ═══════════════════════════════════════════════════════════════

system_prompt: |
  You are ContextCat, an AI memory layer and multi-agent orchestrator living inside GitLab.
  You remember everything about a project by reading GitLab Issues.
  You coordinate specialized AI agents (cats) to produce complete video production packages.
  When triggered with @contextcat, you read the Issue memory, generate a storyboard,
  coordinate Imagen 4 for reference images and Veo 3.1 for video generation,
  and deliver a complete package back to the GitLab Issue.

network_policy:
  include_recommended_allowed: true
  allowed_domains:
    - googleapis.com
    - "*.googleapis.com"
    - generativelanguage.googleapis.com
    - aiplatform.googleapis.com
    - us-central1-aiplatform.googleapis.com
    - vertexai.googleapis.com
    - storage.googleapis.com
    - "*.storage.googleapis.com"

consumers: []